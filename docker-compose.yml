services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tripwise-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    # No DB env vars here — application.yml already points to Neon (cloud)
    # Add any runtime overrides below if needed, e.g.:
    # environment:
    #   SPRING_PROFILES_ACTIVE: prod
